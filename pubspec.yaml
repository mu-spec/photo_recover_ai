name: photo_recover_ai
description: Photo Recover AI - Recover deleted photos, videos, and files from mobile storage.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.5
  permission_handler: ^11.3.0
  sqflite: ^2.3.3
  path: ^1.8.3
  share_plus: ^7.2.1
  flutter_staggered_grid_view: ^0.7.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  google_mobile_ads: ^5.3.0
  video_thumbnail: ^0.5.3
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "app_icon.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/app_icon.png"
  android: true
  ios: false
  android_12:
    image: "assets/app_icon.png"
    color: "#000000"
